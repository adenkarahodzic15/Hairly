<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>L'homme du jazz - Hairly</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

body{
margin:0;
font-family:'Roboto',sans-serif;
background:#0f0f10;
color:white;
}

.top-bar{
background:transparent;
padding:20px 30px;
font-size:24px;
font-weight:700;
color:white;
}

.container{
width:90%;
max-width:1000px;
margin:20px auto;
}

.salon-header{
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-bottom:30px;
flex-wrap:wrap;
}

.salon-info h1{
margin:0;
font-size:32px;
}

.address{
color:#aaa;
margin-top:5px;
}

.reviews{
margin-top:8px;
cursor:pointer;
color:#ccc;
}

.reviews-list{
display:none;
margin-top:10px;
background:#1a1a1c;
padding:15px;
border-radius:10px;
}

.review-item{
margin-bottom:10px;
padding-bottom:10px;
border-bottom:1px solid #333;
}

.add-review-btn{
margin-top:10px;
padding:8px 12px;
border:none;
border-radius:20px;
background:white;
color:black;
cursor:pointer;
}

.review-form{
display:none;
margin-top:10px;
background:#2a2a2c;
padding:10px;
border-radius:10px;
}

.review-form input,
.review-form textarea,
.review-form select{
width:100%;
margin-bottom:8px;
padding:8px;
border-radius:6px;
border:none;
background:#1a1a1c;
color:white;
}

.review-form button{
padding:8px;
width:100%;
border:none;
border-radius:20px;
background:white;
color:black;
cursor:pointer;
}

.appointment-btn{
padding:12px 25px;
border:none;
border-radius:25px;
background:white;
color:black;
cursor:pointer;
font-weight:500;
transition:0.2s;
}

.appointment-btn:hover{
opacity:0.8;
}

.carousel{
position:relative;
width:100%;
max-width:900px;
margin:30px auto;
}

.carousel-track{
display:flex;
gap:15px;
overflow-x:auto;
}

.carousel-item{
width:280px;
height:180px;
object-fit:cover;
border-radius:12px;
}

.service-category{
margin-top:40px;
}

.service-category h2{
margin-bottom:15px;
}

.service-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
margin-bottom:10px;
background:#1a1a1c;
border-radius:12px;
}

.service-item button{
padding:8px 16px;
border:none;
border-radius:20px;
background:white;
color:black;
cursor:pointer;
}

.time-slots{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

.time-slot{
padding:10px 15px;
background:#1a1a1c;
border-radius:8px;
cursor:pointer;
}

.time-slot.selected{
background:white;
color:black;
}

#reservationModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:2000;
}

.modal-content{
background:#1a1a1c;
padding:25px;
border-radius:15px;
width:400px;
max-width:95%;
}

.modal-content input,
.modal-content select{
width:100%;
padding:10px;
margin-bottom:10px;
border:none;
border-radius:8px;
background:#2a2a2c;
color:white;
}

.modal-content button{
width:100%;
padding:12px;
border:none;
border-radius:25px;
background:white;
color:black;
cursor:pointer;
margin-bottom:8px;
}

#successMessage{
text-align:center;
margin-top:10px;
}

@media (max-width:768px){
.salon-header{
flex-direction:column;
gap:15px;
}
}

</style>
</head>

<body>

<div class="top-bar">Hairly</div>

<div class="container">

<div class="salon-header">

<div class="salon-info">
<h1>L'homme du jazz</h1>
<p class="address">12 rue des Augustins, Metz</p>

<p class="reviews" onclick="toggleReviews()">
⭐⭐⭐⭐⭐ (<span id="reviewCount">0</span> avis) ▼
</p>

<div class="reviews-list" id="reviewsList">
<p>Aucun avis pour le moment</p>

<button class="add-review-btn" onclick="showReviewForm()">+ Ajouter un avis</button>

<div class="review-form" id="reviewForm">
<input type="text" id="reviewName" placeholder="Votre nom">
<textarea id="reviewComment" placeholder="Votre commentaire"></textarea>

<select id="reviewRating">
<option value="">Note</option>
<option value="1">1 ⭐</option>
<option value="2">2 ⭐</option>
<option value="3">3 ⭐</option>
<option value="4">4 ⭐</option>
<option value="5">5 ⭐</option>
</select>

<button onclick="submitReview()">Publier</button>
</div>

</div>

</div>

<button class="appointment-btn" onclick="openReservation()">Prendre rendez-vous</button>

</div>

<div class="carousel">
<div class="carousel-track">
<img src="salon1.png" class="carousel-item">
<img src="salon2.png" class="carousel-item">
<img src="salon3.png" class="carousel-item">
<img src="salon4.png" class="carousel-item">
<img src="salon5.png" class="carousel-item">
</div>
</div>

</div>

<div id="reservationModal">
<div class="modal-content">

<h2>Réserver</h2>

<form id="reservationForm">

<input type="hidden" id="serviceInput">
<input type="hidden" id="dureeInput">

<input type="text" name="nom" placeholder="Nom" required>
<input type="text" name="prenom" placeholder="Prénom" required>
<input type="email" name="email" placeholder="Email" required>
<input type="text" name="telephone" placeholder="Téléphone" required>

<select id="coiffeurInput">
<option value="Edin">Edin</option>
</select>

<input type="date" name="date" required>

<div id="timeSlots" class="time-slots"></div>

<button type="submit">Confirmer</button>
<button type="button" onclick="closeReservation()">Annuler</button>

</form>

<p id="successMessage"></p>

</div>
</div>

<script>

let selectedTime="";

function toggleReviews(){
const list=document.getElementById("reviewsList");
list.style.display = list.style.display==="block"?"none":"block";
loadReviews();
}

function showReviewForm(){
document.getElementById("reviewForm").style.display="block";
}

async function loadReviews(){
const res=await fetch("http://localhost:3000/avis/homme-du-jazz");
const data=await res.json();

const container=document.getElementById("reviewsList");
const count=document.getElementById("reviewCount");

count.innerText=data.length;

if(data.length===0){
container.innerHTML=`<p>Aucun avis pour le moment</p>
<button class="add-review-btn" onclick="showReviewForm()">+ Ajouter un avis</button>

<div class="review-form" id="reviewForm">
<input type="text" id="reviewName" placeholder="Votre nom">
<textarea id="reviewComment" placeholder="Votre commentaire"></textarea>

<select id="reviewRating">
<option value="">Note</option>
<option value="1">1 ⭐</option>
<option value="2">2 ⭐</option>
<option value="3">3 ⭐</option>
<option value="4">4 ⭐</option>
<option value="5">5 ⭐</option>
</select>

<button onclick="submitReview()">Publier</button>
</div>`;
return;
}

container.innerHTML="";

data.forEach(r=>{
const div=document.createElement("div");
div.className="review-item";
div.innerHTML=`
<strong>${r.nom}</strong><br>
⭐ ${r.note}/5<br>
<p>${r.commentaire}</p>
`;
container.appendChild(div);
});
}

async function submitReview(){

const nom=document.getElementById("reviewName").value;
const commentaire=document.getElementById("reviewComment").value;
const note=document.getElementById("reviewRating").value;

if(!note){
alert("Choisis une note");
return;
}

await fetch("http://localhost:3000/avis",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
salon_id:"homme-du-jazz",
nom,
commentaire,
note:parseInt(note)
})
});

alert("Avis publié !");
loadReviews();
}

function openReservation(){
document.getElementById("reservationModal").style.display="flex";
}

function closeReservation(){
document.getElementById("reservationModal").style.display="none";
}

</script>

</body>
</html>
