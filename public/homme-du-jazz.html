<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>L'homme du jazz - Hairly</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

body{
margin:0;
font-family:'Roboto',sans-serif;
background:#0f0f10;
color:white;
}

.top-bar{
background:transparent;
padding:20px 30px;
font-size:24px;
font-weight:700;
color:white;
}

.container{
width:90%;
max-width:1000px;
margin:20px auto;
}

.service-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
margin-bottom:10px;
background:#1a1a1c;
border-radius:12px;
}

.service-item button{
padding:8px 16px;
border:none;
border-radius:20px;
background:white;
color:black;
cursor:pointer;
}

#reservationModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:2000;
}

.modal-content{
background:#1a1a1c;
padding:25px;
border-radius:15px;
width:400px;
max-width:95%;
}

.modal-content input,
.modal-content select{
width:100%;
padding:10px;
margin-bottom:10px;
border:none;
border-radius:8px;
background:#2a2a2c;
color:white;
}

.modal-content button{
width:100%;
padding:12px;
border:none;
border-radius:25px;
background:white;
color:black;
cursor:pointer;
margin-bottom:8px;
}

.time-slots{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

.time-slot{
padding:10px 15px;
background:#1a1a1c;
border-radius:8px;
cursor:pointer;
}

.time-slot.selected{
background:white;
color:black;
}
</style>
</head>

<body>

<div class="top-bar">Hairly</div>

<div class="container">

<h1>L'homme du jazz</h1>

<div class="service-item">
<span>Coupe classique homme - 21€</span>
<button onclick="selectService('Coupe classique homme',30)">Choisir</button>
</div>

<div class="service-item">
<span>Dégradé américain - 30€</span>
<button onclick="selectService('Dégradé américain',30)">Choisir</button>
</div>

<div class="service-item">
<span>Coupe enfant - 16€</span>
<button onclick="selectService('Coupe enfant',30)">Choisir</button>
</div>

</div>

<!-- MODAL -->
<div id="reservationModal">

<div class="modal-content">

<h2>Réserver</h2>

<form id="reservationForm">

<input type="hidden" id="serviceInput">

<input type="text" name="nom" placeholder="Nom" required>
<input type="text" name="prenom" placeholder="Prénom" required>
<input type="email" name="email" placeholder="Email" required>
<input type="text" name="telephone" placeholder="Téléphone" required>

<select id="coiffeurInput">
<option value="Edin">Edin</option>
</select>

<input type="date" name="date" required>

<div id="timeSlots" class="time-slots"></div>

<button type="submit">Confirmer</button>
<button type="button" onclick="closeReservation()">Annuler</button>

</form>

<p id="successMessage"></p>

</div>
</div>

<script>

let selectedService="";
let selectedTime="";

function selectService(service){
selectedService=service;
openReservation();
}

function openReservation(){
document.getElementById("reservationModal").style.display="flex";
document.getElementById("serviceInput").value=selectedService;
generateTimeSlots();
}

function closeReservation(){
document.getElementById("reservationModal").style.display="none";
}

function generateTimeSlots(){
const container=document.getElementById("timeSlots");
container.innerHTML="";

for(let h=9;h<19;h++){
["00","30"].forEach(min=>{
const time=h.toString().padStart(2,"0")+":"+min;
const slot=document.createElement("div");
slot.className="time-slot";
slot.innerText=time;

slot.onclick=()=>{
document.querySelectorAll(".time-slot").forEach(s=>s.classList.remove("selected"));
slot.classList.add("selected");
selectedTime=time;
};

container.appendChild(slot);
});
}
}

document.getElementById("reservationForm").addEventListener("submit",async(e)=>{
e.preventDefault();

if(!selectedTime){
alert("Choisissez un horaire");
return;
}

const form=e.target;

const data={
service:selectedService,
nom:form.nom.value,
prenom:form.prenom.value,
email:form.email.value,
telephone:form.telephone.value,
date:form.date.value,
heure:selectedTime,
coiffeur:document.getElementById("coiffeurInput").value,
salon:"homme-du-jazz"
};

try{

const res=await fetch("https://hairly-5hth.onrender.com/reservation",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
credentials:"include",
body:JSON.stringify(data)
});

const result=await res.json();

if(result.success){
document.getElementById("successMessage").innerText="✅ Rendez-vous confirmé";
}else{
document.getElementById("successMessage").innerText="❌ " + (result.message || "Erreur");
}

}catch(err){
console.error(err);
document.getElementById("successMessage").innerText="❌ Erreur serveur";
}

});

</script>

</body>
</html>
