<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>L'homme du jazz - Hairly</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

body{
margin:0;
font-family:'Roboto',sans-serif;
background:#0f0f10;
color:white;
}

.top-bar{
padding:20px 30px;
font-size:24px;
font-weight:700;
}

.container{
width:90%;
max-width:1000px;
margin:20px auto;
}

.service-item{
display:flex;
justify-content:space-between;
padding:15px;
margin-bottom:10px;
background:#1a1a1c;
border-radius:12px;
}

button{
padding:10px;
border:none;
border-radius:20px;
cursor:pointer;
}

#reservationModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modal-content{
background:#1a1a1c;
padding:25px;
border-radius:15px;
width:400px;
}

input{
width:100%;
margin-bottom:10px;
padding:10px;
border-radius:8px;
border:none;
}

.time-slot{
padding:10px;
background:#2a2a2c;
margin:5px;
display:inline-block;
cursor:pointer;
}

.selected{
background:white;
color:black;
}
</style>
</head>

<body>

<div class="top-bar">Hairly</div>

<div class="container">

<h1>L'homme du jazz</h1>

<div class="service-item">
<span>Dégradé américain</span>
<button onclick="selectService('Dégradé américain',30)">Choisir</button>
</div>

</div>

<!-- MODAL -->
<div id="reservationModal">
<div class="modal-content">

<h2>Réserver</h2>

<form id="reservationForm">

<input type="text" name="nom" placeholder="Nom" required>
<input type="text" name="prenom" placeholder="Prénom" required>
<input type="email" name="email" placeholder="Email" required>
<input type="text" name="telephone" placeholder="Téléphone" required>
<input type="date" name="date" required>

<div id="timeSlots"></div>

<button type="submit">Confirmer</button>
<button type="button" onclick="closeReservation()">Annuler</button>

</form>

<p id="successMessage"></p>

</div>
</div>

<script>

let selectedService="";
let selectedDuree=30;
let selectedTime="";

function selectService(service,duree){
selectedService=service;
selectedDuree=duree;
openReservation();
}

function openReservation(){
document.getElementById("reservationModal").style.display="flex";
generateTimeSlots();
}

function closeReservation(){
document.getElementById("reservationModal").style.display="none";
}

function generateTimeSlots(){
const container=document.getElementById("timeSlots");
container.innerHTML="";

for(let h=9;h<19;h++){
["00","30"].forEach(min=>{
const time=h.toString().padStart(2,"0")+":"+min;

const slot=document.createElement("div");
slot.className="time-slot";
slot.innerText=time;

slot.onclick=()=>{
document.querySelectorAll(".time-slot").forEach(s=>s.classList.remove("selected"));
slot.classList.add("selected");
selectedTime=time;
};

container.appendChild(slot);
});
}
}

// 🔥 FIX PRINCIPAL ICI
document.getElementById("reservationForm").addEventListener("submit",async(e)=>{
e.preventDefault();

if(!selectedTime){
alert("Choisissez un horaire");
return;
}

const form=e.target;

const data={
service:selectedService,
duree:selectedDuree,
nom:form.nom.value,
prenom:form.prenom.value,
email:form.email.value,
telephone:form.telephone.value,
date:form.date.value,
heure:selectedTime,
coiffeur:"Edin",
salon:"homme-du-jazz"
};

try{

const res=await fetch(window.location.origin + "/reservation",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

const result=await res.json();

if(result.success){
document.getElementById("successMessage").innerText="✅ Rendez-vous confirmé";
form.reset();
selectedTime="";
}else{
document.getElementById("successMessage").innerText="❌ " + (result.message || "Erreur");
}

}catch(err){
console.error(err);
alert("Erreur serveur");
}

});

</script>

</body>
</html>
