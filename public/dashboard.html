<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Agenda Salon - Hairly</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

<style>
body{
  font-family:system-ui;
  margin:0;
  background:#eef2f7;
  overflow:hidden;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background:white;
  box-shadow:0 3px 15px rgba(0,0,0,0.08);
}

.logo{
  font-size:26px;
  font-weight:700;
  color:#0078d4;
}

.logout{
  padding:10px 18px;
  background:#0078d4;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.calendar-container{
  max-width:1300px;
  margin:40px auto;
  padding:0 20px;
  height:calc(100vh - 100px);
}

#calendar{
  background:white;
  border-radius:12px;
  padding:25px;
  height:100%;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">Hairly Agenda</div>
  <button class="logout" onclick="logout()">Déconnexion</button>
</div>

<div class="calendar-container">
  <div id="calendar"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>

async function logout(){
  // fallback si route inexistante
  try {
    await fetch("/logout");
  } catch(e){}
  window.location.href="/";
}

let calendar;

async function loadCalendar(){

  const res = await fetch("/dashboard-reservations");

  if(!res.ok){
    console.log("Erreur API reservations");
    return;
  }

  const reservations = await res.json();

  const events = reservations.map(r => ({
    id: r.id, // ✅ corrigé
    title: `${r.nom} ${r.prenom} - ${r.service} (${r.duree} min)`,
    start: r.date + "T" + r.heure
  }));

  const isMobile = window.innerWidth < 768;

  if(!calendar){

    calendar = new FullCalendar.Calendar(document.getElementById('calendar'),{

      initialView: isMobile ? 'timeGridDay' : 'timeGridWeek',
      locale:"fr",

      slotMinTime:"08:00:00",
      slotMaxTime:"19:00:00",

      editable:false,
      selectable:true,

      nowIndicator:true,
      height:'100%',

      headerToolbar:{
        left:'prev,next today',
        center:'title',
        right: isMobile ? '' : 'timeGridWeek,timeGridDay'
      },

      events: events

    });

    calendar.render();

  }else{

    calendar.removeAllEvents();
    events.forEach(e=>calendar.addEvent(e));

  }
}

setInterval(loadCalendar,5000);
loadCalendar();

</script>

</body>
</html>
