<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hairly - Nos salons</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

body{
margin:0;
font-family:'Roboto', sans-serif;
color:white;

/* IMAGE MOBILE */
background:url("bg-mobile.jpg") center/cover no-repeat;
min-height:100vh;
}

/* IMAGE DESKTOP */
@media(min-width:768px){
body{
background:url("bg-desktop.jpg") center/cover no-repeat;
}
}

/* OVERLAY */
body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
z-index:-1;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
align-items:center;
justify-content:space-between;
padding:20px 25px;
z-index:1000;
}

.logo{
font-size:28px;
font-weight:700;
color:white;
}

.menu{
position:absolute;
left:50%;
transform:translateX(-50%);
display:flex;
gap:25px;
}

.menu a{
text-decoration:none;
color:white;
font-weight:500;
opacity:0.9;
}

.menu a:hover{
opacity:1;
}

/* CONTENU */

.container{
padding-top:120px;
width:90%;
max-width:1100px;
margin:auto;
text-align:center;
}

h1{
font-size:40px;
margin-bottom:50px;
font-weight:700;
}

/* GRID */

.salons-grid{
display:grid;
grid-template-columns:1fr;
gap:25px;
}

/* PC GRID */

@media(min-width:768px){
.salons-grid{
grid-template-columns:repeat(2,1fr);
}
}

@media(min-width:1024px){
.salons-grid{
grid-template-columns:repeat(3,1fr);
}
}

/* CARD */

.salon-card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border-radius:20px;
overflow:hidden;
text-decoration:none;
color:white;
transition:0.3s;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.salon-card:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

/* IMAGE */

.salon-card img{
width:100%;
height:200px;
object-fit:cover;
}

/* INFO */

.salon-info{
padding:20px;
text-align:left;
}

.salon-info h2{
margin:0;
font-size:22px;
}

.address{
margin-top:8px;
opacity:0.8;
font-size:14px;
}

.reviews{
margin-top:10px;
font-size:16px;
}

/* BOUTON */

.book-btn{
margin-top:15px;
display:inline-block;
padding:10px 18px;
background:black;
border-radius:20px;
font-size:14px;
}

</style>

</head>

<body>

<div class="navbar">

<div class="logo">Hairly</div>

<div class="menu">
<a href="salons.html">Nos salons</a>
<a href="contact.html">Contact</a>
</div>

</div>

<div class="container">

<h1>Réservez votre salon</h1>

<div class="salons-grid">

<a href="homme-du-jazz.html" class="salon-card">

<img src="salon1.png">

<div class="salon-info">

<h2>L'homme du jazz</h2>

<div class="address">
12 rue des Augustins, Metz
</div>

<div class="reviews">
⭐⭐⭐⭐⭐
</div>

<div class="book-btn">
Réserver
</div>

</div>

</a>

</div>

</div>

</body>
</html>
