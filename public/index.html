<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hairly - Trouvez votre salon</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

body{
margin:0;
font-family:'Roboto', sans-serif;

/* MOBILE IMAGE */
background:url('bg-mobile.jpg') center/cover no-repeat;
min-height:100vh;
color:#fff;
}

/* DESKTOP IMAGE */
@media (min-width:768px){
body{
background:url('bg-desktop.jpg') center/cover no-repeat;
}
}

/* OVERLAY PRO */
body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,0.35);
z-index:-1;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 25px;
box-sizing:border-box;
z-index:1000;
}

/* LOGO */
.logo{
font-size:28px;
font-weight:700;
color:white;
}

/* MENU CENTRÉ */

.menu{
position:absolute;
left:50%;
transform:translateX(-50%);
display:flex;
gap:25px;
}

.menu a{
text-decoration:none;
font-size:16px;
font-weight:500;
color:white;
opacity:0.9;
}

.menu a:hover{
opacity:1;
}

/* ICON USER */

.user-icon{
cursor:pointer;
display:flex;
align-items:center;
background:rgba(255,255,255,0.15);
padding:10px;
border-radius:50%;
backdrop-filter:blur(8px);
}

.user-icon svg{
width:22px;
height:22px;
fill:white;
}

/* LOGIN BOX */

#loginBox{
position:absolute;
top:70px;
right:20px;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
display:none;
width:220px;
z-index:2000;
}

#loginBox input{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

#loginBox button{
width:100%;
padding:10px;
border:none;
border-radius:6px;
background:black;
color:white;
cursor:pointer;
}

#errorLogin{
color:red;
font-size:13px;
text-align:center;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
box-sizing:border-box;
}

.hero h1{
font-size:44px;
margin-bottom:10px;
font-weight:700;
}

.hero p{
font-size:18px;
margin-bottom:35px;
opacity:0.9;
}

/* SEARCH */

.search-container{
width:100%;
max-width:520px;
display:flex;
flex-direction:column;
align-items:center;
position:relative;
}

/* INPUT STYLE PREMIUM */

input{
width:100%;
padding:18px;
font-size:16px;
border-radius:30px;
border:none;
margin-bottom:12px;
box-sizing:border-box;
background:rgba(255,255,255,0.9);
}

/* BUTTON STYLE PREMIUM */

button{
width:100%;
padding:16px;
font-size:16px;
border-radius:30px;
border:none;
background:black;
color:white;
cursor:pointer;
transition:0.2s;
}

button:hover{
opacity:0.85;
}

/* suggestions */

.suggestions{
width:100%;
background:white;
border-radius:10px;
overflow:hidden;
display:none;
position:absolute;
top:55px;
box-shadow:0 3px 10px rgba(0,0,0,0.15);
z-index:100;
}

.suggestion{
padding:12px;
cursor:pointer;
color:#000;
}

.suggestion:hover{
background:#f0f0f0;
}

/* MOBILE */

@media (max-width:768px){

.menu{
position:static;
transform:none;
width:100%;
justify-content:center;
margin-top:10px;
}

.hero h1{
font-size:28px;
}

.hero p{
font-size:16px;
}

}

</style>
</head>

<body>

<div class="navbar">

<div class="logo">Hairly</div>

<div class="menu">
<a href="salons.html">Nos salons</a>
<a href="contact.html">Contact</a>
</div>

<div class="user-icon" onclick="toggleLogin()">
<svg viewBox="0 0 24 24">
<path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"/>
</svg>
</div>

</div>

<div id="loginBox">

<input id="loginEmail" placeholder="Email">
<input id="loginPassword" type="password" placeholder="Mot de passe">

<button onclick="login()">Se connecter</button>

<p id="errorLogin"></p>

</div>

<div class="hero">

<h1>Bienvenue sur Hairly</h1>
<p>Trouvez et réservez votre salon de coiffure en quelques secondes</p>

<div class="search-container">

<input id="search" type="text" placeholder="Rechercher un salon ou une ville...">

<div id="suggestions" class="suggestions">
<div class="suggestion" onclick="goSalon()">L'homme du jazz</div>
</div>

<button onclick="searchSalon()">Rechercher</button>

</div>

</div>

<script>

function toggleLogin(){
const box=document.getElementById("loginBox");
box.style.display=box.style.display==="block"?"none":"block";
}

const input=document.getElementById("search");
const suggestions=document.getElementById("suggestions");

input.addEventListener("input",function(){

const value=input.value.toLowerCase();

if(value.includes("homme") || value.includes("jazz")){
suggestions.style.display="block";
}else{
suggestions.style.display="none";
}

});

function goSalon(){
window.location.href="homme-du-jazz.html";
}

function searchSalon(){

const value=input.value.toLowerCase();

if(value.includes("homme") || value.includes("jazz")){
window.location.href="homme-du-jazz.html";
}else{
alert("Aucun salon trouvé");
}

}

async function login(){

const email=document.getElementById("loginEmail").value;
const password=document.getElementById("loginPassword").value;

const res=await fetch("/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})
});

const data=await res.json();

if(data.success){
window.location.href=data.redirect;
}else{
document.getElementById("errorLogin").innerText="Email ou mot de passe incorrect";
}

}

</script>

</body>
</html>
