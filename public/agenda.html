<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Agenda Salon - Hairly</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<style>

body{
margin:0;
font-family:'Roboto',sans-serif;
background:#0f0f0f;
color:white;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 30px;
}

.header h1{
margin:0;
font-size:24px;
}

.add-btn{
background:white;
color:black;
border:none;
padding:10px 18px;
border-radius:20px;
cursor:pointer;
font-weight:500;
}

/* CALENDAR */
#calendar{
max-width:1100px;
margin:20px auto;
background:white;
padding:10px;
border-radius:12px;
color:black;
}

/* EVENTS STYLE (IMPORTANT) */
.fc-event{
background:black !important;
border:none !important;
color:white !important;
padding:3px !important;
border-radius:6px !important;
}

/* MODAL */
#modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:9999;
}

.modal-content{
background:white;
color:black;
padding:25px;
border-radius:10px;
width:320px;
}

.modal-content input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

.modal-content button{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:6px;
cursor:pointer;
}

.save{background:black;color:white;}
.close{background:#ddd;}

/* MOBILE */
@media (max-width:768px){

#calendar{
max-width:100%;
margin:10px;
padding:5px;
}

.fc{
min-width:700px;
}

.header{
flex-direction:column;
align-items:flex-start;
gap:10px;
padding:15px;
}

.header h1{font-size:20px;}

.add-btn{
position:fixed;
bottom:20px;
right:20px;
z-index:2000;
}

.fc-toolbar-title{font-size:14px !important;}
.fc-button{font-size:12px !important;padding:5px 8px !important;}
.fc-timegrid-axis{font-size:10px !important;}
.fc-event{font-size:10px !important;}

}

</style>
</head>

<body>

<div class="header">
<h1>Agenda</h1>
<button class="add-btn" onclick="openModal()">+ Ajouter</button>
</div>

<div id="calendar"></div>

<!-- MODAL -->
<div id="modal">
<div class="modal-content">

<h3>Nouveau RDV</h3>

<input id="nom" placeholder="Nom">
<input id="prenom" placeholder="Prénom">
<input id="telephone" placeholder="Téléphone">
<input id="date" type="date">
<input id="heure" type="time">

<button class="save" onclick="createRDV()">Créer</button>
<button class="close" onclick="closeModal()">Annuler</button>

</div>
</div>

<script>

let calendar;

// 💰 PRIX
function getPrice(service){

  const prices = {
    "Coupe classique homme":21,
    "Dégradé américain":24,
    "Coupe enfant":16,
    "Coupe + barbe tondeuse":29,
    "Coupe + barbe coupe choux":24,
    "Forfait relaxant avec barbe":60,
    "Forfait relaxant sans barbe":42,
    "RDV manuel":0
  };

  return prices[service] || 0;
}

// ===== LOAD =====
document.addEventListener('DOMContentLoaded', async function() {

  try {

    const res = await fetch(window.location.origin + "/dashboard-reservations", {
      credentials:"include"
    });

    if (res.status === 401) {
      alert("Veuillez vous connecter");
      window.location.href = "/login.html";
      return;
    }

    const reservations = await res.json();

    const events = reservations.map(r => {

      let heureISO = r.heure?.length === 5 ? r.heure + ":00" : r.heure;

      return {
        id: r.id,
        title: `${r.nom} ${r.prenom} - ${r.service} - ${getPrice(r.service)}€`,
        start: `${r.date}T${heureISO}`
      };
    });

    calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {

      initialView: 'timeGridWeek',
      locale: 'fr',
      firstDay: 1,

      displayEventTime: false,

      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'timeGridWeek,dayGridMonth'
      },

      slotMinTime: "08:00:00",
      slotMaxTime: "20:00:00",

      events: events,

      eventClick: function(info){

        const choix = prompt(
          "1 = Valider le RDV\n2 = Supprimer le RDV"
        );

        if(choix === "1"){

          info.event.setProp("title", "✅ " + info.event.title);
          info.event.setProp("backgroundColor", "green");

        }

        if(choix === "2"){
          supprimerRDV(info.event);
        }

      }

    });

    calendar.render();

  } catch (err){
    console.error(err);
    alert("Erreur chargement agenda");
  }

});

// ===== DELETE =====
async function supprimerRDV(event){

  try {

    const res = await fetch(window.location.origin + "/reservation/" + event.id,{
      method:"DELETE",
      credentials:"include"
    });

    const result = await res.json();

    if(result.success){
      event.remove();
    } else {
      alert("Erreur suppression");
    }

  } catch(err){
    console.error(err);
    alert("Erreur serveur");
  }

}

// ===== MODAL =====
function openModal(){
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

// ===== CREATE RDV =====
async function createRDV(){

const nom = document.getElementById("nom").value;
const prenom = document.getElementById("prenom").value;
const telephone = document.getElementById("telephone").value;
const date = document.getElementById("date").value;
const heure = document.getElementById("heure").value;

if(!nom || !date || !heure){
alert("Champs obligatoires");
return;
}

try {

const res = await fetch(window.location.origin + "/reservation",{
method:"POST",
headers:{"Content-Type":"application/json"},
credentials:"include",
body:JSON.stringify({
nom,
prenom,
telephone,
date,
heure,
service:"RDV manuel",
coiffeur:"Salon"
})
});

const result = await res.json();

if(result.success){

calendar.addEvent({
id: result.id,
title: nom + " " + prenom + " - RDV manuel",
start: date + "T" + heure
});

alert("✅ Rendez-vous ajouté");
closeModal();

}else{
alert(result.message || "Erreur");
}

} catch(err){
console.error(err);
alert("Erreur serveur");
}

}

</script>

</body>
</html>
