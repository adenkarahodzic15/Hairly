<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Agenda Salon - Hairly</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<style>

body{
margin:0;
font-family:'Roboto',sans-serif;
background:#0f0f0f;
color:white;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 30px;
gap:10px;
}

.header h1{
margin:0;
font-size:24px;
}

.header-center{
display:flex;
gap:10px;
align-items:center;
}

.add-btn{
background:white;
color:black;
border:none;
padding:10px 18px;
border-radius:20px;
cursor:pointer;
font-weight:500;
}

.ca-panel{
display:none;
background:white;
color:black;
padding:10px 15px;
border-radius:10px;
font-size:14px;
min-width:160px;
}

#calendar{
max-width:1100px;
margin:20px auto;
background:white;
padding:10px;
border-radius:12px;
color:black;
position:relative;
z-index:1;
}

/* MODAL */
#modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:9999;
}

.modal-content{
background:white;
color:black;
padding:25px;
border-radius:10px;
width:320px;
}

.modal-content input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

.modal-content button{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:6px;
cursor:pointer;
}

.save{background:black;color:white;}
.close{background:#ddd;}

/* MOBILE */
@media (max-width:768px){

#calendar{
max-width:100%;
margin:10px;
padding:5px;
overflow-x:auto;
}

.fc{min-width:700px;}

.header{
flex-direction:column;
align-items:flex-start;
}

.add-btn{
position:fixed;
bottom:20px;
right:20px;
z-index:2000;
}

}

</style>
</head>

<body>

<div class="header">

<h1>Agenda</h1>

<div class="header-center">

<button class="add-btn" onclick="toggleCA()">CA</button>

<div id="caPanel" class="ca-panel">
<div><b>Jour :</b> <span id="caDay">0€</span></div>
<div><b>Semaine :</b> <span id="caWeek">0€</span></div>
<div><b>Mois :</b> <span id="caMonth">0€</span></div>
</div>

</div>

<button class="add-btn" onclick="openModal()">+ Ajouter</button>

</div>

<div id="calendar"></div>

<!-- MODAL -->
<div id="modal">
<div class="modal-content">

<h3>Nouveau RDV</h3>

<input id="nom" placeholder="Nom">
<input id="prenom" placeholder="Prénom">
<input id="telephone" placeholder="Téléphone">
<input id="date" type="date">
<input id="heure" type="time">

<button class="save" onclick="createRDV()">Créer</button>
<button class="close" onclick="closeModal()">Annuler</button>

</div>
</div>

<script>

let calendar;
let allReservations = [];

// PRIX SERVICES
function getPrice(service){

const prices = {
"Coupe classique homme": 21,
"Dégradé américain": 24,
"Coupe enfant": 16,
"Coupe + barbe tondeuse": 29,
"Coupe + barbe coupe choux": 24,
"Forfait relaxant avec barbe": 60,
"Forfait relaxant sans barbe": 42,
"RDV manuel": 0
};

return prices[service] || 0;
}

// CA PANEL
function toggleCA(){
const p = document.getElementById("caPanel");
p.style.display = p.style.display === "block" ? "none" : "block";
updateCA();
}

function updateCA(){

const now = new Date();

let day = 0;
let week = 0;
let month = 0;

const startWeek = new Date(now);
startWeek.setDate(now.getDate() - now.getDay());

const endWeek = new Date(startWeek);
endWeek.setDate(startWeek.getDate() + 7);

allReservations.forEach(r => {

const date = new Date(r.date);
const price = getPrice(r.service);

if(date.toDateString() === now.toDateString()) day += price;
if(date >= startWeek && date <= endWeek) week += price;
if(date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear()) month += price;

});

document.getElementById("caDay").innerText = day + "€";
document.getElementById("caWeek").innerText = week + "€";
document.getElementById("caMonth").innerText = month + "€";
}

// LOAD
document.addEventListener('DOMContentLoaded', async function() {

const res = await fetch(window.location.origin + "/dashboard-reservations", {
credentials:"include"
});

if(res.status === 401){
window.location.href="/login.html";
return;
}

const reservations = await res.json();
allReservations = reservations;

const events = reservations.map(r => {

let heureISO = r.heure?.length === 5 ? r.heure + ":00" : r.heure;

return {
id:r.id,
title:`${r.nom} ${r.prenom} - ${r.telephone || ""}`,
start:`${r.date}T${heureISO}`,
extendedProps:{
service:r.service
}
};

});

calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {

initialView:'timeGridWeek',
locale:'fr',
firstDay:1,

headerToolbar:{
left:'prev,next today',
center:'title',
right:'timeGridWeek,dayGridMonth'
},

slotMinTime:"08:00:00",
slotMaxTime:"20:00:00",

events:events,

eventClick:function(info){

const choix = prompt("1 = Valider\n2 = Supprimer");

if(choix === "1"){
info.event.setProp("title","✅ " + info.event.title);
info.event.setProp("backgroundColor","green");
}

if(choix === "2"){
supprimerRDV(info.event);
}

}

});

calendar.render();
updateCA();

});

// DELETE
async function supprimerRDV(event){

await fetch(window.location.origin + "/reservation/" + event.id,{
method:"DELETE",
credentials:"include"
});

event.remove();
}

// MODAL
function openModal(){document.getElementById("modal").style.display="flex";}
function closeModal(){document.getElementById("modal").style.display="none";}

// CREATE
async function createRDV(){

const nom=document.getElementById("nom").value;
const prenom=document.getElementById("prenom").value;
const telephone=document.getElementById("telephone").value;
const date=document.getElementById("date").value;
const heure=document.getElementById("heure").value;

const res=await fetch(window.location.origin+"/reservation",{
method:"POST",
headers:{"Content-Type":"application/json"},
credentials:"include",
body:JSON.stringify({
nom,prenom,telephone,date,heure,
service:"RDV manuel",
coiffeur:"Salon"
})
});

const result=await res.json();

if(result.success){
location.reload();
}

}

</script>

</body>
</html>
